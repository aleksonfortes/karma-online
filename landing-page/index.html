<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karma Online - Welcome</title>
    <meta name="description" content="Karma Online - A multiplayer web game">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            padding: 2rem;
        }

        .title {
            font-size: 4rem;
            margin-bottom: 2rem;
            text-align: center;
            color: #ffffff;
            animation: glow 2s ease-in-out infinite alternate;
            letter-spacing: 2px;
        }

        .description {
            font-size: 1.2rem;
            max-width: 600px;
            text-align: center;
            margin-bottom: 3rem;
            color: #cccccc;
            line-height: 1.8;
        }

        .button-group {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .button {
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .play-button {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
        }

        .discord-button {
            background: #5865F2;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .newsletter-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 15px;
            max-width: 600px;
            width: 100%;
            margin-top: 2rem;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .newsletter-section h2 {
            color: #4ecdc4;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        .newsletter-section p {
            color: #cccccc;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .newsletter-section iframe {
            border: none !important;
            background: transparent !important;
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            display: block;
        }

        .domain-info {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            font-size: 0.8rem;
            color: #666;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.5),
                           0 0 20px rgba(255, 255, 255, 0.5);
            }
            to {
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.8),
                           0 0 30px rgba(255, 255, 255, 0.8);
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 3rem;
            }
            
            .description {
                font-size: 1.1rem;
                padding: 0 1rem;
            }
            
            .button-group {
                flex-direction: column;
                width: 100%;
                max-width: 300px;
            }
            
            .button {
                width: 100%;
                justify-content: center;
            }
            
            .newsletter-section {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Karma Online</h1>
        <p class="description">
            A multiplayer game crafted by AI with DevYogi's touch.
            Making fun accessible through your browser.
        </p>
        <div class="button-group">
            <a href="https://play.karmaonline.io" class="button play-button">
                <i class="fas fa-play"></i> Play Now
            </a>
            <a href="https://discord.gg/429gGAd6" class="button discord-button">
                <i class="fab fa-discord"></i> Join Discord
            </a>
        </div>
        <div class="newsletter-section">
            <h2>Stay Updated</h2>
            <p>Subscribe to our newsletter to receive game updates and to learn how we are developing the game using AI.</p>
            <iframe 
                src="https://devyogi.substack.com/embed" 
                width="480" 
                height="150" 
                style="background:transparent !important;" 
                frameborder="0" 
                scrolling="no">
            </iframe>
        </div>
    </div>
    <div class="domain-info">karmaonline.io</div>
    
    <!-- Script fallback for error handling, using absolute path -->
    <script>
        // Fallback in case the script fails to load
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'SCRIPT') {
                console.log('Script loading error - using fallback');
            }
        }, true);
    </script>
    <script type="module" src="/assets/main.js" onerror="console.error('Failed to load main.js')"></script>
</body>
</html>
