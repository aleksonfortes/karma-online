<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karma Online</title>
    <meta name="description" content="Karma Online - A multiplayer web game">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            padding: 2rem;
        }

        .title {
            font-size: 4rem;
            margin-bottom: 2rem;
            text-align: center;
            color: #ffffff;
            animation: glow 2s ease-in-out infinite alternate;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.5rem;
            max-width: 600px;
            text-align: center;
            margin-bottom: 3rem;
            color: #cccccc;
        }

        .cta-button {
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .domain-info {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            font-size: 0.8rem;
            color: #666;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.5),
                           0 0 20px rgba(255, 255, 255, 0.5);
            }
            to {
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.8),
                           0 0 30px rgba(255, 255, 255, 0.8);
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 3rem;
            }
            
            .subtitle {
                font-size: 1.1rem;
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Karma Online</h1>
        <h2 class="subtitle">A multiplayer web game experience</h2>
        <a href="https://play.karmaonline.io" class="cta-button">Play Now</a>
    </div>
    <div class="domain-info">karmaonline.io</div>
    
    <!-- Use an absolute path and add a fallback -->
    <script>
        // Fallback in case the module script fails to load
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'SCRIPT') {
                console.log('Script loading error - using fallback');
            }
        }, true);
    </script>
    <script type="module" src="/assets/main.js" onerror="console.error('Failed to load main.js')"></script>
</body>
</html>
